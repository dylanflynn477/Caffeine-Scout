location:
  zip_code: "19103"
  maximum_distance_miles: 5
brands:
  - {name: "Alani Nu", aliases: ["Alani"], target_price_per_can: 1.40, default_caffeine_mg: 200}
  - {name: "Ghost", aliases: ["Ghost Energy"], target_price_per_can: 1.60, default_caffeine_mg: 200}
  - {name: "C4", aliases: ["C4 Energy", "Cellucor C4"], target_price_per_can: 1.50, default_caffeine_mg: 200}
product_filters:
  required_terms: ["energy"]
  excluded_terms: ["powder", "pre-workout", "packet", "mix", "supplement", "empty can"]
crawler:
  user_agent: "CaffeineScout/0.1 (+https://github.com/dylanflynn477/Caffeine-Scout)"
  contact: ""
  respect_robots_txt: true
  allow_when_robots_unavailable: true
  minimum_request_interval_seconds: 3
  per_domain_concurrency: 1
  response_cache_hours: 12
  request_timeout_seconds: 20
  playwright_timeout_seconds: 30
  observe_public_product_json: true
  stop_on_captcha: true
  stop_on_access_denied: true
  maximum_pages_per_source_per_scan: 10
sources:
  mock: {enabled: true}
  jsonld:
    enabled: true
    product_urls: []
    product_pages:
      - {retailer: "GNC", enabled: false, url: "https://www.gnc.com/energy-drinks/ghost-energy-drink.html", fulfillment_type: "online"}
      - {retailer: "GNC", enabled: false, url: "https://www.gnc.com/energy-drinks/alaniNuEnergyCase.html", fulfillment_type: "online"}
      - {retailer: "GNC", enabled: false, url: "https://www.gnc.com/energy-drinks/cellucor-c4-energy.html", fulfillment_type: "online"}
      - {retailer: "The Vitamin Shoppe", enabled: false, url: "https://www.vitaminshoppe.com/p/ghost-energy-original-12-drink-s/ghs-16538", fulfillment_type: "online"}
      - {retailer: "GIANT Instant Delivery", enabled: false, url: "https://instant.giantfoodstores.com/store/giant-instant-delivery/products/25517425-alani-nu-cherry-slush-flavored-energy-drink-12-fl-oz", fulfillment_type: "delivery"}
    catalog_pages:
      - {retailer: "GNC", url: "https://www.gnc.com/drinks/energy-drinks/", local_store: "1625 Chestnut St, Philadelphia, PA 19103", note: "Discovery only; exact product pages are disabled above"}
      - {retailer: "The Vitamin Shoppe", url: "https://www.vitaminshoppe.com/c/food-drinks/drinks/energy-drinks", local_store: "1701 Chestnut St, Philadelphia, PA 19103", note: "Discovery only; select an exact product page"}
      - {retailer: "ACME Markets", url: "https://www.acmemarkets.com/shop/aisles/beverages/energy-drinks-shots/energy-drinks-shots.html", local_store: "1001 South St, Philadelphia, PA 19147", note: "Discovery only; dynamic grocery catalog"}
      - {retailer: "GIANT", url: "https://giantfoodstores.com/groceries/beverages/energy-drinks.html", local_store: "60 N 23rd St, Philadelphia, PA 19103", note: "Discovery only; store selection affects offers"}
      - {retailer: "CVS", url: "https://www.cvs.com/shop/grocery/beverages/sport-energy-drinks", note: "Discovery only; dynamic catalog"}
      - {retailer: "Target", url: "https://www.target.com/c/energy-drinks-beverages-grocery/-/N-4uez2", note: "Discovery handled by the dedicated Target adapter"}
  target:
    enabled: true
    discovery_urls: ["https://www.target.com/c/energy-drinks-beverages-grocery/-/N-4uez2"]
    maximum_pages: 3
    visit_product_pages: false
  cvs:
    enabled: true
    discovery_urls: ["https://www.cvs.com/shop/grocery/beverages/sport-energy-drinks"]
    maximum_pages: 3
    visit_product_pages: false
  acme:
    enabled: false
    discovery_urls: ["https://www.acmemarkets.com/shop/aisles/beverages/energy-drinks-shots/energy-drinks-shots.html"]
    maximum_pages: 3
    visit_product_pages: false
  amazon: {enabled: false}
scoring:
  incredible_price_per_can: 1.00
  ordinary_price_per_can: 2.50
  history_window_days: 30
  minimum_history_samples: 3
alerts:
  minimum_robbery_score: 80
  maximum_price_per_can: 1.50
  notify_on_new_historical_low: true
